<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrazyGift Save Goal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css">

</head>
<body>
<div class="app">

  <!-- Greeting -->
  <div class="card-muted">
    <div class="greeting-time" id="greetingTime"></div>
    <div class="greeting-name" id="greetingText">Hello, Saver!</div>
    <div class="quote" id="motivationQuote"></div>
  </div>

  <!-- Setup view -->
  <div id="noGoalView">
    <div class="card">
      <div class="section-label"><i class="ti ti-target"></i> Set your savings goal</div>

      <div class="form-row">
        <label>Your name</label>
        <input type="text" id="userName" placeholder="e.g. Alex" maxlength="30" />
      </div>
      <div class="form-row">
        <label>What are you saving for?</label>
        <input type="text" id="goalName" placeholder="e.g. Buy a car, Travel to Paris…" maxlength="60" />
      </div>
      <div class="form-row">
        <label>Target amount (KES)</label>
        <input type="number" id="goalAmount" placeholder="e.g. 500000" min="1" />
      </div>
      <div class="form-row">
        <label>Target date</label>
        <input type="date" id="goalDate" />
      </div>
      <div class="form-row">
        <label>Already saved (KES) — leave 0 if starting fresh</label>
        <input type="number" id="startSaved" value="0" min="0" />
      </div>

      <button class="btn-green btn-full" onclick="createGoal()">
        <i class="ti ti-check"></i> Create goal
      </button>
    </div>
  </div>

  <!-- Goal view -->
  <div id="goalView">

    <div class="congrats-box" id="congratsBox">
      <i class="ti ti-trophy"></i>
      You've reached your savings goal! Incredible work!
    </div>

    <!-- Progress card -->
    <div class="card">
      <div class="goal-header">
        <div class="goal-header-left">
          <div class="goal-icon" id="goalEmoji"></div>
          <div>
            <div class="goal-title" id="goalTitle"></div>
            <div class="goal-sub" id="goalSubtitle"></div>
          </div>
        </div>
        <button class="btn-icon" onclick="resetGoal()" title="Reset goal">
          <i class="ti ti-settings"></i>
        </button>
      </div>

      <div class="progress-track">
        <div class="progress-fill" id="progressBar" style="width:0%"></div>
      </div>
      <div class="progress-labels">
        <span id="savedLabel">KES 0</span>
        <span class="pct-badge" id="pctBadge">0%</span>
        <span id="totalLabel">KES 0</span>
      </div>

      <div class="stats-grid">
        <div class="stat">
          <div class="stat-val" id="statRemaining">—</div>
          <div class="stat-lbl">Remaining</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="statDaysLeft">—</div>
          <div class="stat-lbl">Days left</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="statDaily">—</div>
          <div class="stat-lbl">Needed/day</div>
        </div>
      </div>

      <div class="recommend-box">
        <i class="ti ti-bulb"></i>
        <span id="recommendText"></span>
      </div>
    </div>

    <!-- Log savings -->
    <div class="card">
      <div class="section-label"><i class="ti ti-plus"></i> Log today's savings</div>
      <div class="log-row">
        <input type="number" id="logAmount" placeholder="Amount (KES)" min="1" />
        <input type="date" id="logDate" />
        <button class="btn-green" onclick="logSaving()">
          <i class="ti ti-device-floppy"></i> Save
        </button>
      </div>
    </div>

    <!-- History -->
    <div class="card">
      <div class="section-label"><i class="ti ti-history"></i> Savings history</div>
      <div id="historyList"></div>
    </div>

  </div>
</div>
<script src="script.js"></script>
</body>
</html>
